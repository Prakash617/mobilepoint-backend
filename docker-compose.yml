version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mobilepoint_backend
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=mobilepoint.settings
    volumes:
      - static_volume:/app/public/static
      - media_volume:/app/media
    ports:
      - "127.0.0.1:8000:8001"
    networks:
      - mobilepoint-network
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: mobilepoint_db
    environment:
      - POSTGRES_DB=mobilepoint
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mobilepoint-network
    restart: unless-stopped

  nginx-static:
    image: nginx:alpine
    container_name: mobilepoint_nginx_static
    volumes:
      - static_volume:/usr/share/nginx/html/static:ro
      - media_volume:/usr/share/nginx/html/media:ro
      - ./nginx/static.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - mobilepoint-network
    restart: unless-stopped
    depends_on:
      - backend

networks:
  mobilepoint-network:
    external: true

volumes:
  postgres_data:
  static_volume:
  media_volume:
