version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mobilepoint_backend
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=mobilepoint.settings
    volumes:
      - static_volume:/app/public/static
      - media_volume:/app/media
    ports:
      - "8000:8001"
    networks:
      - dokploy-network
    restart: unless-stopped

  nginx-static:
    image: nginx:alpine
    container_name: mobilepoint_nginx_static
    volumes:
      - static_volume:/usr/share/nginx/html/static:ro
      - media_volume:/usr/share/nginx/html/media:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dokploy-network
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  media_volume:
  static_volume:

networks:
  dokploy-network:
    external: true