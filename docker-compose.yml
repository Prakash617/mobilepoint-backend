version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: mobilepoint_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mobilepoint
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: mobilepoint_web
    command: sh -c "python manage.py migrate && gunicorn mobilepoint.wsgi:application --bind 0.0.0.0:8001 --workers 4"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DEBUG=False

  nginx:
    image: nginx:alpine
    container_name: mobilepoint_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
